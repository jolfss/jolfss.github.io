<div class="table-scroll">
    <div class="table-scroll__viewport" role="region" aria-label="Scrollable table" tabindex="0">
    <table>
        <thead>
            {{ range .THead }}
            <tr>
                {{ range . }}<th{{ with .Alignment }} style="text-align: {{ . }};"{{ end }}>{{ .Text }}</th>{{ end }}
            </tr>
            {{ end }}
        </thead>
        <tbody>
            {{ range .TBody }}
            <tr>
                {{ range . }}<td{{ with .Alignment }} style="text-align: {{ . }};"{{ end }}>{{ .Text }}</td>{{ end }}
            </tr>
            {{ end }}
        </tbody>
    </table>
    </div>
</div>
