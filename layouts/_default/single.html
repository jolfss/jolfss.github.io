{{ define "main" }}
<article class="article-page pane">
    <header class="article-header">
        <h1>{{ .Title }}</h1>
        {{ with .Date }}<time datetime="{{ .Format "2006-01-02" }}">{{ .Format "January 2, 2006" }}</time>{{ end }}
        {{ partial "authors.html" (dict "page" . "showAffiliations" true) }}
        {{ with .Params.summary }}<p class="summary">{{ . }}</p>{{ end }}
    </header>
    <div class="prose">
        {{ .Content }}
    </div>
</article>
{{ end }}
