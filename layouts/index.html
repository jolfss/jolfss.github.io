{{ define "main" }}
<section class="home-pane pane">
    <div class="home-layout">
        {{ with .Params.portrait }}
        <figure class="home-portrait">
            <img src="{{ . | relURL }}" alt="{{ $.Params.portrait_alt_text }}">
        </figure>
        {{ end }}
        <div class="home-copy prose">
            {{ .Content }}
        </div>
    </div>
</section>
{{ end }}
